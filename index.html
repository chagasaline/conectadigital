<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta Digital - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header>
    <h1>Conecta Digital</h1>
    <p>Sistema de Inclusão Digital e Capacitação Comunitária</p>
</header>

<section class="container">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <h2>Acesso ao Sistema</h2>
        <form id="loginForm">
            <label>Usuário (admin ou CPF/E-mail):</label>
            <input type="text" id="loginUser" placeholder="admin ou seu CPF/E-mail" required>

            <label>Senha:</label>
            <input type="password" id="loginPassword" placeholder="********" required>

            <button type="submit">Entrar</button>
        </form>
        <p style="margin-top: 20px; text-align: center;">
            Não possui cadastro? <a href="cadastro.html" style="color: #0d6efd;">Cadastre-se aqui</a>
        </p>
        <div id="loginError" style="color: red; margin-top: 15px; text-align: center; display: none;">
            Credenciais inválidas. Tente novamente.
        </div>
    </div>
</section>

<footer>
    Conecta Digital © 2026 - Sistema de Inclusão Tecnológica
</footer>

<script src="script.js"></script>
</body>
</html>
